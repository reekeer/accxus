name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "v0.3.0"

      publish_pypi:
        description: "Publish package to PyPI"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    environment:
      name: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            echo "Expected: vX.Y.Z"
            exit 1
          fi
          echo "Version format valid: $VERSION"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine hatchling

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --max-count=50 --pretty=format:"- %s")
          else
            LOG=$(git log ${PREV_TAG}..HEAD --max-count=100 --pretty=format:"- %s")
          fi

          {
            echo 'notes<<EOF'
            echo "# accxus ${{ github.event.inputs.version }}"
            echo
            echo "## Changes"
            echo
            echo "$LOG"
            echo
            echo "## Installation"
            echo
            echo '```bash'
            echo 'pip install accxus'
            echo '```'
            echo
            echo "## PyPI"
            echo
            echo "https://pypi.org/project/accxus/"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ github.event.inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: accxus ${{ github.event.inputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
          files: |
            dist/*

      - name: Publish to PyPI
        if: github.event.inputs.publish_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          skip-existing: true
          verbose: true