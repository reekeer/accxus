name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "v0.3.0"

      publish_pypi:
        description: "Publish package to PyPI"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            build \
            twine \
            hatchling

          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pyright
        run: pyright .

      - name: Pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short

  release:
    name: Release
    needs: verify
    runs-on: ubuntu-latest

    environment:
      name: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            build \
            twine \
            hatchling

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s")
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s")
          fi

          {
            echo 'notes<<EOF'

            echo "# Accxus ${{ github.event.inputs.version }}"
            echo

            echo "## Changes"
            echo
            echo "$LOG"
            echo

            echo "## Installation"
            echo
            echo '```bash'
            echo 'pip install accxus'
            echo '```'
            echo

            echo "## PyPI"
            echo
            echo "https://pypi.org/project/accxus/"
            echo

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          TAG="${{ github.event.inputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Accxus ${{ github.event.inputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true

          files: |
            dist/*

      - name: Publish to PyPI
        if: github.event.inputs.publish_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1